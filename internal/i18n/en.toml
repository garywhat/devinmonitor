calendar      = "Show full-year contribution calendar"
compare       = "Compare two time periods side by side"
h24           = "Show activity over the last 24 hours (hourly chart)"
theme         = "Manage TUI color themes"
replay        = "Replay a session message by message"
timeline      = "Show a visual timeline of session activity"

